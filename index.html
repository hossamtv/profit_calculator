<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>حاسبة الأرباح</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Tahoma', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
      direction: rtl;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 24px;
      width: 100%; max-width: 480px;
      text-align: center;
    }
    h2 { margin-top: 0; color: #333; }
    label { display: block; text-align: right; margin-top: 12px; font-weight: bold; }
    input, select {
      width: 100%; padding: 10px; margin-top: 6px;
      border: 1px solid #ccc; border-radius: 8px;
      font-size: 15px;
    }
    .radio-group {
      display: flex; justify-content: space-around; margin-top: 10px;
      font-size: 14px;
    }
    .radio-group label { font-weight: normal; }
    button {
      margin-top: 18px; width: 100%;
      padding: 12px; border: none;
      border-radius: 10px; font-size: 16px;
      background: #667eea; color: #fff;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #5563c1; }
    .results {
      margin-top: 20px; padding: 15px;
      background: #f9f9f9; border-radius: 10px;
      text-align: right; font-size: 15px;
      line-height: 1.8; color: #222;
    }
    .results span { font-weight: bold; color: #333; }
    .note { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📊 حاسبة الأرباح</h2>
    <label for="amount">المبلغ الأساسي (جنيه):</label>
    <input type="number" id="amount" placeholder="اكتب المبلغ" min="0" step="0.01">

    <label for="percent">النسبة %:</label>
    <input type="number" id="percent" placeholder="مثال: 10" min="0" step="0.0001">

    <label for="rateType">نوع النسبة:</label>
    <select id="rateType">
      <option value="year">سنوية %</option>
      <option value="month">شهرية %</option>
      <option value="day">يومية %</option>
    </select>

    <label>نوع الحساب:</label>
    <div class="radio-group">
      <label><input type="radio" name="method" value="simple" checked> بسيط</label>
      <label><input type="radio" name="method" value="compound_month"> مركب (شهري)</label>
      <label><input type="radio" name="method" value="compound_year"> مركب (سنوي)</label>
    </div>

    <button onclick="calc()">احسب</button>

    <div class="results" id="res">💡 أدخل البيانات ثم اضغط احسب.</div>
    <div class="note">ملاحظة: الحسابات تفترض 30 يوم للشهر و 365 يوم للسنة.</div>
  </div>

  <script>
    function fmt(n) {
      return Number(n).toLocaleString('ar-EG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calc() {
      const amount = parseFloat(document.getElementById('amount').value);
      const percent = parseFloat(document.getElementById('percent').value);
      const type = document.getElementById('rateType').value;
      const method = document.querySelector('input[name="method"]:checked').value;

      if (isNaN(amount) || amount <= 0 || isNaN(percent) || percent < 0) {
        document.getElementById('res').innerHTML = "⚠️ من فضلك ادخل قيم صحيحة.";
        return;
      }

      let daily = 0, monthly = 0, yearly = 0;
      const r = percent / 100;

      if (method === "simple") {
        if (type === "year") {
          yearly = amount * r;
          monthly = yearly / 12;
          daily = yearly / 365;
        } else if (type === "month") {
          monthly = amount * r;
          yearly = monthly * 12;
          daily = monthly / 30;
        } else if (type === "day") {
          daily = amount * r;
          monthly = daily * 30;
          yearly = daily * 365;
        }
      } else if (method === "compound_month") {
        if (type === "year") {
          const monthlyRate = r / 12;
          yearly = amount * (Math.pow(1 + monthlyRate, 12) - 1);
          monthly = yearly / 12;
          daily = yearly / 365;
        } else if (type === "month") {
          const monthlyRate = r;
          yearly = amount * (Math.pow(1 + monthlyRate, 12) - 1);
          monthly = yearly / 12;
          daily = yearly / 365;
        } else if (type === "day") {
          const dailyRate = r;
          yearly = amount * (Math.pow(1 + dailyRate, 365) - 1);
          monthly = yearly / 12;
          daily = yearly / 365;
        }
      } else if (method === "compound_year") {
        if (type === "year") {
          yearly = amount * (Math.pow(1 + r, 1) - 1);
          monthly = yearly / 12;
          daily = yearly / 365;
        } else if (type === "month") {
          const annualRate = Math.pow(1 + r, 12) - 1;
          yearly = amount * annualRate;
          monthly = yearly / 12;
          daily = yearly / 365;
        } else if (type === "day") {
          const annualRate = Math.pow(1 + r, 365) - 1;
          yearly = amount * annualRate;
          monthly = yearly / 12;
          daily = yearly / 365;
        }
      }

      const totalDaily = amount + daily;
      const totalMonthly = amount + monthly;
      const totalYearly = amount + yearly;

      document.getElementById('res').innerHTML = `
        📅 <span>الربح اليومي:</span> ${fmt(daily)} جنيه | <span>الإجمالي:</span> ${fmt(totalDaily)} جنيه<br>
        📆 <span>الربح الشهري:</span> ${fmt(monthly)} جنيه | <span>الإجمالي:</span> ${fmt(totalMonthly)} جنيه<br>
        📈 <span>الربح السنوي:</span> ${fmt(yearly)} جنيه | <span>الإجمالي:</span> ${fmt(totalYearly)} جنيه
      `;
    }
  </script>
</body>
</html>
